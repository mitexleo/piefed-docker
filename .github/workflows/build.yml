name: Build Docker Image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - entrypoint.sh
      - entrypoint_celery.sh
      - entrypoint_notifs.sh
      - scripts/**
      - piefed/**
      - docker-compose.yml
      - .github/workflows/build.yml
  workflow_dispatch:

env:
  DOCKER_IMAGE: mitexleo/piefed-docker

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Read version from Dockerfile
        id: version
        run: |
          VERSION=$(sed -n 's/.*org\.opencontainers\.image\.version="\(.*\)".*/\1/p' Dockerfile)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building image: $DOCKER_IMAGE:v$VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:v${{ steps.version.outputs.version }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
